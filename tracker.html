<script>
document.addEventListener("DOMContentLoaded", () => {
const params = new URLSearchParams(window.location.search);
const url = params.get('url');

if (!url) {
    alert("No event selected. Please select an event from the home page.");
    navigateTo('./');
    return;
}

const localListStr = localStorage.getItem('myg_sheetList');
if(localListStr) {
    try {
        const list = JSON.parse(localListStr);
        const match = list.find(x => x.sheetUrl === url);
        if(match) {
            document.getElementById('navContextTitle').innerText = "Live: " + match.displayName;
        }
    } catch(e) {}
}

currentCommAttSheetUrl = url;
document.getElementById('navContextActionsCommAtt').classList.remove('hidden');
document.getElementById('navContextActionsCommAtt').classList.add('flex');
document.getElementById('navActionsRow').classList.remove('hidden');
document.getElementById('navActionsRow').classList.add('flex');
loadCommAttendanceData();
});

function openFilteredPairingFromTracker() {
if (!currentCommAttSheetUrl) return;
navigateTo('pairing.html', { url: currentCommAttSheetUrl, filtered: true, source: 'tracker.html' });
}

window.handleNavBack = function() {
navigateTo('./');
};
</script>

<button onclick="closeOverlay()" class="bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-gray-900 dark:text-white font-bold py-3 px-10 rounded-xl border border-gray-300 dark:border-zinc-700 shadow-lg transition-all transform hover:scale-105">Close</button>
</div>
<div id="overlayError" class="hidden flex flex-col items-center text-center">
<div class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(239,68,68,0.4)]">
<i class="fa-solid fa-xmark text-4xl text-white"></i>
</div>
<h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Error</h2>
<p id="overlayErrorText" class="text-red-500 dark:text-red-400 mb-8 max-w-xs text-sm">Something went wrong.</p>
<button onclick="closeOverlay()" class="bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-gray-900 dark:text-white font-bold py-3 px-10 rounded-xl border border-gray-300 dark:border-zinc-700 shadow-lg transition-all transform hover:scale-105">Close</button>
</div>
</div>

<!-- AUTH MODAL (for quick edit unlock) -->
<div id="authModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
<div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-2xl border border-gray-200 dark:border-zinc-800 p-6 shadow-2xl transform transition-all scale-100">
<h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 text-center">Restricted Access</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 mb-4 text-center">Please enter the admin password.</p>
<form onsubmit="handleAuth(event)">
<div class="relative mb-4">
<input type="password" id="adminPassword" class="w-full bg-gray-50 dark:bg-black border border-gray-300 dark:border-zinc-700 rounded-lg py-3 pl-3 pr-10 text-gray-900 dark:text-white text-center tracking-widest focus:border-primary outline-none shadow-sm" placeholder="Password" required>
<button type="button" onclick="togglePasswordVisibility('adminPassword')" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors focus:outline-none"><i id="adminPasswordIcon" class="fa-regular fa-eye"></i></button>
</div>
<div id="authError" class="hidden text-red-500 dark:text-red-400 text-xs text-center mb-3 font-bold">Incorrect Password</div>
<div class="flex gap-2">
<button type="button" onclick="closeAuthModal()" class="flex-1 bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-gray-700 dark:text-gray-300 font-bold py-2 rounded-lg transition-colors">Cancel</button>
<button type="submit" id="authBtn" class="flex-1 bg-primary hover:bg-blue-600 text-white font-bold py-2 rounded-lg transition-colors">Access</button>
</div>
</form>
</div>
</div>
</body>
</html>
