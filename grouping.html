<script>
document.addEventListener("DOMContentLoaded", () => {
 const params = new URLSearchParams(window.location.search);
 const url = params.get('url');
 if (!url) {
     alert("No event selected.");
     navigateTo('admin.html');
     return;
 }
 
 const localListStr = localStorage.getItem('myg_sheetList');
 if(localListStr) {
     try {
         const list = JSON.parse(localListStr);
         const match = list.find(x => x.sheetUrl === url);
         if(match) {
             document.getElementById('navContextTitle').innerText = "Manual Group: " + match.displayName;
         }
     } catch(e) {}
 }
 
 requestAccess(null, () => {
     const mainEl = document.getElementById('protectedMainContent');
     if(mainEl) mainEl.classList.remove('hidden');
     openManualGrouping(url);
 });
});

window.handleNavBack = function() {
 navigateTo('./');
};
</script>
