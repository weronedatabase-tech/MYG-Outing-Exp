<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Attendance Update | MINDS MYG</title>
<base target="_top">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
darkMode: 'class',
theme: { extend: { colors: { primary: '#3b82f6' } } }
}
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="frontend/css/style.css">

<script src="backend/config.js"></script>
<script src="frontend/js/state.js"></script>
<script src="frontend/js/api.js"></script>
<script src="frontend/js/ui.js"></script>
<script src="frontend/js/auth.js"></script>
<script src="frontend/js/volunteer.js"></script>
<script src="frontend/js/main.js"></script>
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen font-sans text-gray-900 dark:text-gray-100 pb-20 selection:bg-primary selection:text-white transition-all">

<div class="sticky top-0 z-50 shadow-lg shrink-0 bg-white dark:bg-zinc-900">
<div id="envBar" class="hidden text-white text-center text-[10px] uppercase tracking-wider font-bold py-0.5 border-b"></div>

<nav class="bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md border-b border-gray-200 dark:border-zinc-800 py-2 flex flex-col justify-center">
<div class="container mx-auto px-2 md:px-4 flex flex-col gap-2">
<div class="flex items-center justify-between w-full min-h-[32px] gap-2">
<div class="flex items-center gap-1.5 min-w-0 flex-1">
<button onclick="handleNavBack()" class="bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-gray-700 dark:text-gray-300 w-8 h-8 flex items-center justify-center rounded shadow-sm shrink-0 transition-colors">
  <i class="fa-solid fa-arrow-left text-sm md:text-base"></i>
</button>
<h1 class="text-base md:text-lg font-extrabold text-gray-900 dark:text-white leading-tight truncate">Attendance Update</h1>
</div>
<div class="flex items-center gap-1.5 shrink-0 pl-2 ml-auto border-l border-gray-200 dark:border-zinc-700">
<button onclick="refreshApp()" class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white text-[10px] md:text-xs transition-colors group flex items-center p-1">
  <i id="refreshIcon" class="fa-solid fa-arrows-rotate text-sm md:text-base group-hover:text-primary transition-transform"></i>
</button>
<button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white text-[10px] md:text-xs transition-colors flex items-center p-1">
  <span class="text-sm md:text-base leading-none">🌗</span>
</button>
<button onclick="navigateTo('./')" class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white text-[10px] md:text-xs transition-colors flex items-center p-1">
  <i class="fa-solid fa-house text-sm md:text-base"></i>
</button>
</div>
</div>
</div>
</nav>
</div>

<main class="container mx-auto p-4 mt-2 max-w-7xl transition-all">
<div class="fade-in">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mt-2 max-w-7xl mx-auto">
<div class="lg:col-span-5 space-y-6">
<div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-2xl p-6 shadow-xl space-y-4">
<div class="relative">
<label class="text-sm font-bold text-green-600 dark:text-green-400 uppercase flex items-center gap-2">1. Select Upcoming Event <span id="volSheetLoading" class="hidden"><i class="fa-solid fa-spinner fa-spin"></i></span></label>
<div class="relative mt-1">
  <select id="volSheetSelector" class="w-full mt-1 bg-gray-50 dark:bg-black border border-gray-300 dark:border-zinc-700 rounded-lg py-3 px-3 text-sm text-gray-900 dark:text-white focus:border-green-500 outline-none appearance-none shadow-sm" onchange="resetVolForm()"><option disabled selected>Loading...</option></select>
  <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-gray-500 dark:text-gray-400"><i class="fa-solid fa-chevron-down"></i></div>
  <div id="volSheetSpinner" class="absolute right-8 top-3 hidden pointer-events-none text-green-500"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
</div>
</div>
<div>
<label class="text-sm font-bold text-green-600 dark:text-green-400 uppercase">2. Select Type</label>
<div class="flex gap-3 mt-2">
  <button type="button" onclick="setVolType('trainee', this)" class="vol-type-btn flex-1 bg-gray-50 dark:bg-black border border-gray-300 dark:border-zinc-700 hover:border-green-500 py-3 rounded-lg text-sm font-bold transition-colors text-gray-700 dark:text-gray-300 shadow-sm">Trainee</button>
  <button type="button" onclick="setVolType('volunteer', this)" class="vol-type-btn flex-1 bg-gray-50 dark:bg-black border border-gray-300 dark:border-zinc-700 hover:border-green-500 py-3 rounded-lg text-sm font-bold transition-colors text-gray-700 dark:text-gray-300 shadow-sm">Volunteer</button>
</div>
</div>
<div id="volNameSection" class="hidden mt-2">
<label class="text-sm font-bold text-green-600 dark:text-green-400 uppercase">3. Search / Select Name</label>
<div class="relative mt-2">
  <div class="relative">
      <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"><i class="fa-solid fa-magnifying-glass text-gray-400 dark:text-gray-500"></i></div>
      <input type="text" id="volNameSearch" class="w-full bg-gray-50 dark:bg-black border border-gray-300 dark:border-zinc-700 rounded-lg py-3 pl-10 pr-10 text-sm text-gray-900 dark:text-white focus:border-green-500 outline-none placeholder-gray-400 dark:placeholder-gray-500 shadow-sm" placeholder="Type to search..." onfocus="autoScrollAndFocus(this)" oninput="filterNames(); toggleClearBtn('volNameSearch')" autocomplete="off">
      <div id="nameLoader" class="absolute right-8 top-1/2 -translate-y-1/2 hidden"><div class="text-gray-500 dark:text-gray-400 text-sm"><i class="fa-solid fa-circle-notch fa-spin"></i></div></div>
      <button type="button" id="clearBtn-volNameSearch" onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 hidden transition-colors z-10"><i class="fa-solid fa-xmark text-lg"></i></button>
  </div>
  <ul id="volNameList" class="absolute z-50 w-full bg-white dark:bg-zinc-900 border border-gray-300 dark:border-cyan-700 rounded-xl mt-2 shadow-2xl hidden max-h-60 overflow-y-auto pb-6"></ul>
</div>
<div id="addNewVolContainer" class="hidden mt-4 text-center">
  <button type="button" onclick="showAddNewForm()" class="text-sm md:text-base text-green-600 dark:text-green-400 hover:text-green-700 dark:hover:text-green-300 font-bold flex items-center justify-center gap-2 w-full py-3 bg-gray-100 dark:bg-zinc-800 rounded-lg border border-dashed border-green-500/30 transition-colors">
      <i class="fa-solid fa-user-plus"></i> ＋ Can't find your name above? Add yourself in here
  </button>
</div>
</div>
</div>
</div>

<div class="lg:col-span-7">
<div id="volFormContainer" class="hidden bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-2xl p-6 shadow-xl h-full">
<h3 id="formTitle" class="font-bold text-gray-900 dark:text-white mb-4 border-b border-gray-200 dark:border-zinc-800 pb-2 text-lg">Update Details</h3>
<form id="attendanceForm" onsubmit="submitAttendance(event)" class="space-y-4">
<div id="newVolProjectContainer" class="hidden mb-4 relative">
  <label class="block text-xs md:text-sm font-bold text-gray-500 dark:text-gray-400 mb-1">Project Group *</label>
  <div class="relative">
      <input type="text" id="newVolProjectSearch" name="Project" class="w-full bg-gray-50 dark:bg-black border border-gray-300 dark:border-zinc-700 rounded-lg p-3 pr-10 text-sm text-gray-900 dark:text-white focus:border-green-500 outline-none shadow-sm placeholder-gray-400 dark:placeholder-gray-500" placeholder="Search Project..." onfocus="toggleProjectList(true)" oninput="filterProjects(); toggleClearBtn('newVolProjectSearch')" autocomplete="off">
      <button type="button" id="clearBtn-newVolProjectSearch" onclick="clearSearchInput('newVolProjectSearch', 'filterProjects')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 hidden transition-colors z-10"><i class="fa-solid fa-xmark text-lg"></i></button>
      <ul id="projectList" class="absolute z-50 w-full bg-white dark:bg-zinc-900 border border-gray-300 dark:border-cyan-700 rounded-xl mt-2 shadow-2xl hidden max-h-40 overflow-y-auto pb-6"></ul>
  </div>
</div>
<div id="dynamicFields" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
<div id="volFormStatus" class="hidden p-3 rounded-lg text-sm text-center"></div>
<button id="volSubmitBtn" type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 md:py-4 rounded-xl shadow-lg mt-6 transition-colors text-base">Update Attendance</button>
</form>
</div>
</div>
</div>
<div class="h-6"></div>
</div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
  loadVolunteerEvents();
});
window.handleNavBack = function() {
  navigateTo('./');
};
</script>

<div id="fullPageOverlay" class="fixed inset-0 z-[110] bg-white/90 dark:bg-black/95 backdrop-blur-sm hidden flex flex-col items-center justify-center p-4 transition-opacity duration-300">
<div id="overlayLoading" class="flex flex-col items-center">
<div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4"></div>
<h2 id="overlayLoadingText" class="text-xl font-bold text-gray-900 dark:text-white animate-pulse">Saving...</h2>
</div>
<div id="overlaySuccess" class="hidden flex flex-col items-center text-center scale-100 transition-transform">
<div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
<i class="fa-solid fa-check text-4xl text-white"></i>
</div>
<h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Success!</h2>
<p id="overlaySuccessText" class="text-gray-600 dark:text-gray-300 mb-8 max-w-xs text-sm">Operation completed.</p>
<button onclick="closeOverlay()" class="bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-gray-900 dark:text-white font-bold py-3 px-10 rounded-xl border border-gray-300 dark:border-zinc-700 shadow-lg transition-all transform hover:scale-105">Close</button>
</div>
<div id="overlayError" class="hidden flex flex-col items-center text-center">
<div class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(239,68,68,0.4)]">
<i class="fa-solid fa-xmark text-4xl text-white"></i>
</div>
<h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Error</h2>
<p id="overlayErrorText" class="text-red-500 dark:text-red-400 mb-8 max-w-xs text-sm">Something went wrong.</p>
<button onclick="closeOverlay()" class="bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-gray-900 dark:text-white font-bold py-3 px-10 rounded-xl border border-gray-300 dark:border-zinc-700 shadow-lg transition-all transform hover:scale-105">Close</button>
</div>
</div>
</body>
</html>
